version: "3.9"

services:
  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    networks: [appnet]
    # No ports exposed; served via reverse-proxy

  monitor:
    build:
      context: ./api-monitor/monitor
    container_name: monitor
    networks: [appnet]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  reverse-proxy:
    build:
      context: ./api-monitor/reverse-proxy
    container_name: reverse-proxy
    depends_on:
      dashboard:
        condition: service_started
      monitor:
        condition: service_healthy
    ports:
      - "80:80"
    networks: [appnet]

networks:
  appnet:
    driver: bridge
